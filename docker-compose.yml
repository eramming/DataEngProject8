services:
  postgres:
    image: postgres:16.3
    environment:
      POSTGRES_USER: jhu
      POSTGRES_PASSWORD: jhu123
      POSTGRES_DB: jhu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  sportsapp:
    build: .
    image: sportsapp:latest
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  airflow-webserver:
    image: apache/airflow:2.9.3
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://jhu:jhu123@postgres:5432/jhu
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/sportsapp
    command: >
      bash -c "airflow db init &&
               airflow users create
               --username admin
               --password admin
               --firstname Rohan
               --lastname User
               --role Admin
               --email rohan@example.com || true &&
               airflow webserver"

  airflow-scheduler:
    image: apache/airflow:2.9.3
    depends_on:
      - postgres
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://jhu:jhu123@postgres:5432/jhu
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/sportsapp
    command: >
      bash -c "pip install psycopg2-binary &&
               airflow scheduler"

volumes:
  pgdata: